# Richmond Fed Fifth District Survey of Service Sector Activity (Non-Manufacturing) → CPT
#
# One record = one release month: the monthly release narrative (which recites the
# diffusion-index readings) paired with a trailing window of those indices. The prose
# *describes* the series → "describes" (value-reciting, EIA/BLS-tier). text_quality "real".
#
# Sibling of 49_richmond_manufacturing (same bank, same site structure, same plumbing) —
# swaps the "manufacturing" segment for "non-manufacturing" and the mfg_ workbook/PDFs for
# the nmf_ (formerly svc_) ones. Family map: docs/fed_surveys_discovery.md.
#
# License: Federal Reserve Bank publications are U.S. public domain / freely reusable.
# ⚠ The index SERIES are also on FRED (Oliver's #9); the novel element is the pairing.
#
# Quick start:
#   pip install -r requirements.txt        # + poppler (pdftotext)
#   python scripts/build_cpt_jsonl.py --dry-run --set output.max_records=3
#   python scripts/build_cpt_jsonl.py                                  # demo (50)
#   python scripts/build_cpt_jsonl.py --set output.max_records=null    # full build (~100)

data:
  bank: "Federal Reserve Bank of Richmond"
  survey_title: "Fifth District Survey of Service Sector Activity"
  district: 5
  domain: "non-manufacturing"

  # Diffusion-index workbook (.xlsx; stdlib-parsed). DATE col = Excel serial; monthly,
  # from Nov-1993. SA current-conditions columns are sa_svc_*_c.
  data_xlsx_url: "https://www.richmondfed.org/-/media/RichmondFedOrg/region_communities/regional_data_analysis/regional_economy/surveys_of_business_conditions/non-manufacturing/data/nmf_historicaldata.xlsx"

  # Release PDFs named by RELEASE DATE (~4th Tuesday) under /{YYYY}/pdf/. The filename
  # prefix changed from `svc_` (2018–2025) to `nmf_` (late-2025→), so the build probes
  # BOTH prefixes. No clean archive listing → compute the candidate date + probe nearby days.
  pdf_dir_template: "https://www.richmondfed.org/-/media/RichmondFedOrg/region_communities/regional_data_analysis/regional_economy/surveys_of_business_conditions/non-manufacturing/{year}/pdf/{prefix}_{mm}_{dd}_{yy}.pdf"
  pdf_prefixes: ["nmf", "svc"]

  # SA current-month diffusion channels (workbook column -> channel name). The narrative
  # leads with revenues + demand. (ave_workwk has no SA column, so it is omitted.)
  channels:
    - {col: "sa_svc_revs_sales_c",     name: "revenues"}
    - {col: "sa_svc_demand_c",         name: "demand"}
    - {col: "sa_svc_emp_c",            name: "employment"}
    - {col: "sa_svc_ave_wage_c",       name: "wages"}
    - {col: "sa_svc_local_bus_cond_c", name: "local_business_conditions"}
    - {col: "sa_svc_capital_expnd_c",  name: "capital_expenditures"}

  window_months: 24          # trailing months per record; dropped if fewer available
  min_text_year: 2017        # release PDFs only exist ~2018+; skip older months
  # canonical originating page (schema v1 `source` must be a URL)
  source_url: "https://www.richmondfed.org/region_communities/regional_data_analysis/surveys/service_sector"
  cache_dir: ".cache"
  user_agent: "CPT-dataset-research faisal@usc.edu"
  request_delay_s: 0.3
  timeout_s: 60

text:
  min_text_chars: 200
  ts_intro_sentence: "{bank} {survey_title} - monthly diffusion indices (revenues, demand, employment, wages, local business conditions, capital expenditures), trailing {n} months through {month}: <ts></ts>"

output:
  output_path: output/richmond_nonmanufacturing_cpt.jsonl
  report_path: output/run_report.json
  samples_path: samples/example_output.jsonl
  max_records: 50
