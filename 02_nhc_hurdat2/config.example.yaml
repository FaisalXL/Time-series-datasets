# NHC HURDAT2 → CPT world-knowledge JSONL
#
# One record per tropical cyclone (Atlantic + East Pacific): real NHC text —
# the post-storm Tropical Cyclone Report (TCR) and/or public advisories — plus
# a 9-channel 6-hourly time series over the storm's qualifying tropical/
# subtropical life. Storms without any retrievable real text are dropped — no
# synthetic fallback.
#
# Quick start:
#   pip install -r requirements.txt
#   python scripts/build_cpt_jsonl.py --config config.example.yaml
#
# Use cached HURDAT2 (avoid re-download):
#   python scripts/build_cpt_jsonl.py \
#     --set data.source=local \
#     --set data.local_path=.cache/hurdat2/hurdat2-1851-2023-051124.txt

data:
  # download — fetch from NHC (cached under .cache/hurdat2/)
  # local    — read from data.local_path
  source: download

  # atlantic | east_pacific | both
  basin: both

  atlantic_url: "https://www.nhc.noaa.gov/data/hurdat/hurdat2-1851-2023-051124.txt"
  east_pacific_url: "https://www.nhc.noaa.gov/data/hurdat/hurdat2-nepac-1949-2023-042624.txt"

  # Local HURDAT2 .txt when source=local
  local_path: null

  # 1998 is the earliest year with recoverable public-advisory archives.
  season_start: 1998
  season_end: 2023

  # Minimum TD/TS/HU/SS/SD observations per storm
  min_qualifying_obs: 8

  # Storm IDs (AL092021) or names (IDA); empty = all
  storm_filter: []

advisories:
  # When false, no advisory fetch is attempted (TCR may still supply text).
  enabled: true

  # Max advisory files concatenated per storm, spread evenly across the storm's
  # life (formation -> peak -> landfall -> dissipation), always incl. first/last.
  max_per_storm: 6

  # Character limit per individual advisory before concatenation.
  char_limit_per_advisory: 3000

  # HTTP timeout per advisory/index request (seconds).
  timeout_seconds: 10

tcr:
  # NHC post-storm Tropical Cyclone Report (definitive PDF narrative).
  # Best-effort: fetched, pdftotext'd, and prepended when available; storms
  # with neither a TCR nor advisories are dropped.
  enabled: true

  # {storm_id} = HURDAT2 id (e.g. AL122005); {name} = Title-case storm name.
  tcr_url_template: "https://www.nhc.noaa.gov/data/tcr/{storm_id}_{name}.pdf"

  # Max characters of TCR narrative kept per record.
  tcr_char_limit: 6000

  # HTTP timeout for the TCR PDF download (seconds).
  timeout_seconds: 30

text:
  # Labels leading each real-text block within the record.
  tcr_label: "NOAA National Hurricane Center — Tropical Cyclone Report:"
  advisory_label: "NHC Public Advisories:"

  # Closing sentence appended after the text. Must contain exactly one <ts></ts>.
  ts_intro_sentence: "Six-hourly observations across the storm's lifetime — maximum sustained wind (kt), minimum central pressure (mb), track latitude, track longitude, maximum 34-kt wind radius (nm), maximum 50-kt wind radius (nm), maximum 64-kt wind radius (nm), forward translation speed (kt), and heading (degrees): <ts></ts>."

output:
  output_path: output/nhc_hurdat2_cpt.jsonl
  report_path: output/run_report.json
  max_records: 50
  indent: null
